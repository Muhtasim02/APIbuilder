<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Maker Pro</title>
    <style>
      :root { --bg:#07111f; --card:#101c30; --text:#f8fafc; --muted:#9fb0c9; --accent:#5eead4; --accent-2:#7c3aed; --danger:#ff6b6b; }
      *{box-sizing:border-box;} body{margin:0;font-family:Inter,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,var(--bg),#111827);color:var(--text);} .page{max-width:1100px;margin:0 auto;padding:24px;} .hero{display:grid;grid-template-columns:1.2fr 0.8fr;gap:20px;align-items:center;} .card{background:rgba(16,28,48,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:22px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,0.25);} .btn{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white;border:none;padding:12px 16px;border-radius:999px;cursor:pointer;font-weight:600;} .muted{color:var(--muted);} form{display:grid;gap:12px;} input{padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:#16253e;color:var(--text);} .msg{min-height:22px;margin-top:8px;font-weight:600;color:var(--accent);} .msg.error{color:var(--danger);} .tag{display:inline-block;padding:8px 10px;border-radius:999px;background:rgba(94,234,212,0.16);color:var(--accent);margin-bottom:12px;} @media (max-width:900px){.hero{grid-template-columns:1fr;}}
    </style>
  </head>
  <body>
    <div class="page">
      <div class="hero">
        <div class="card">
          <div class="tag">REST API • LLM ready • Secure auth</div>
          <h1>Create APIs with a beautiful, real workflow</h1>
          <p class="muted">Login to access your dashboard, choose a plan, and generate API endpoints with a modern payment flow through bKash.</p>
        </div>
        <div class="card">
          <h2 id="authTitle">Login</h2>
          <form id="authForm">
            <input id="nameInput" placeholder="Full name" />
            <input id="emailInput" type="email" placeholder="Email" required />
            <input id="passwordInput" type="password" placeholder="Password" required />
            <button class="btn" type="submit" id="authSubmit">Login</button>
            <div class="msg" id="msg"></div>
            <p class="muted" id="switchText">New here? <a href="#" id="switchMode">Create account</a></p>
          </form>
        </div>
      </div>
    </div>
    <script>
      const form = document.getElementById('authForm');
      const msg = document.getElementById('msg');
      const authTitle = document.getElementById('authTitle');
      const authSubmit = document.getElementById('authSubmit');
      const switchText = document.getElementById('switchText');
      const nameInput = document.getElementById('nameInput');
      let signup = false;
      function toggleMode(){
        signup = !signup;
        authTitle.textContent = signup ? 'Create account' : 'Login';
        authSubmit.textContent = signup ? 'Create account' : 'Login';
        nameInput.style.display = signup ? 'block' : 'none';
        switchText.innerHTML = signup
          ? 'Already have an account? <a href="#" id="switchMode">Login instead</a>'
          : 'New here? <a href="#" id="switchMode">Create account</a>';
        document.getElementById('switchMode').addEventListener('click', (e)=>{ e.preventDefault(); toggleMode(); });
      }
      form.addEventListener('submit', async (e)=>{
        e.preventDefault();
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!email || !password) {
          msg.className = 'msg error';
          msg.textContent = 'Please enter your email and password.';
          return;
        }
        const payload = { email, password };
        if (signup) payload.name = document.getElementById('nameInput').value.trim();
        try {
          const res = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode: signup ? 'signup' : 'login', ...payload })});
          const data = await res.json();
          msg.className = 'msg' + (res.ok ? '' : ' error');
          msg.textContent = data.message;
          if (res.ok) {
            window.location.assign('/plans');
          }
        } catch (error) {
          msg.className = 'msg error';
          msg.textContent = 'Connection failed. Please refresh and try again.';
        }
      });
      toggleMode();
    </script>
  </body>
</html>
